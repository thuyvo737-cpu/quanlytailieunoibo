<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu Tài liệu nội bộ — Ban QLCL - BVQY175</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#12261e; --paper:#f3f7f3; --paper-2:#ffffff; --line:#dbe6dc;
    --green:#1c8a5c; --green-deep:#0f4a34; --green-soft:#e6f3ea;
    --lime:#8bc34a; --muted:#5f7168; --red:#a13322; --red-soft:#fbeceb;
    --mono:'JetBrains Mono',Consolas,monospace;
    --head:'Manrope',system-ui,sans-serif; --sans:'Inter','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;}
  header{background:var(--green-deep);color:#eef7f0;padding:20px 26px;border-bottom:4px solid var(--lime);}
  header h1{font-family:var(--head);font-weight:800;font-size:21px;margin:0;}
  header .sub{font-size:12px;color:#bfe0cc;font-family:var(--mono);margin-top:2px;}
  main{max-width:1200px;margin:0 auto;padding:20px 18px 70px;}
  .panel{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;max-width:100%;}
  .chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--paper-2);color:var(--muted);font-size:11.5px;font-family:var(--mono);cursor:pointer;white-space:nowrap;line-height:1.3;}
  .chip.active{background:var(--green-deep);border-color:var(--green-deep);color:#fff;font-weight:700;}
  .chip.status-chip{border-color:#e6b6ac;color:var(--red);}
  .chip.status-chip.active{background:var(--red);border-color:var(--red);color:#fff;}
  .chip .n{opacity:.75;}
  .chip-row-sep{width:100%;height:0;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  input, select{padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:var(--sans);background:#fbfdfa;color:var(--ink);}
  input[type=search]{flex:1;min-width:220px;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{text-align:left;padding:7px;background:var(--green-soft);border-bottom:2px solid var(--line);color:var(--green-deep);position:sticky;top:0;white-space:nowrap;}
  tbody td{padding:6px 7px;border-bottom:1px solid #ecf1ec;}
  tbody tr:hover{background:#f7faf6;}
  tbody tr.expired{background:var(--red-soft);}
  .mstl{font-family:var(--mono);font-weight:700;color:var(--green-deep);}
  .badge{display:inline-block;font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:12px;}
  .badge.ok{background:var(--green-soft);color:var(--green-deep);}
  .badge.bad{background:var(--red-soft);color:var(--red);}
  .table-wrap{max-height:540px;overflow:auto;border:1px solid var(--line);border-radius:8px;}
  .empty{padding:26px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px;}
  .note{font-size:11.5px;color:var(--muted);font-family:var(--mono);padding:8px 10px;background:var(--green-soft);border-left:3px solid var(--lime);margin-top:10px;border-radius:0 4px 4px 0;}
  .count-line{font-size:12px;color:var(--muted);margin-bottom:8px;}
  footer{text-align:center;color:var(--muted);font-size:11px;font-family:var(--mono);padding:18px;}
</style>
</head>
<body>

<header>
  <h1>Tra cứu Tài liệu nội bộ</h1>
  <div class="sub">Ban QLCL - BVQY175 — Chỉ xem, không chỉnh sửa được từ trang này</div>
</header>

<main>
  <section class="panel">
    <div class="chips" id="typeChips"></div>
    <div class="toolbar">
      <input type="search" id="searchBox" placeholder="Tìm theo tên tài liệu, đơn vị, MSTL…">
      <select id="unitFilter"><option value="">Tất cả đơn vị biên soạn</option></select>
      <select id="yearFilter"><option value="">Tất cả các năm</option></select>
    </div>
    <div class="count-line" id="countLine"></div>
    <div class="table-wrap"><table id="dataTable">
      <thead><tr id="tableHead"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table></div>
    <div class="note" id="statusNote">Đang tải dữ liệu…</div>
  </section>
</main>

<footer>Dữ liệu chỉ-đọc, đồng bộ từ Google Sheet "Tra cứu" · Cập nhật mỗi khi trang quản lý lưu thay đổi.</footer>

<script>
// ============================================================
// CẤU HÌNH — dán link CSV đã "Publish to web" của sheet Tra cứu
// (1 link duy nhất, vì toàn bộ dữ liệu đã gộp vào 1 trang tính).
// Xem hướng dẫn "Thiết lập trang Tra cứu" trong README.
// ============================================================
const CSV_URL = 'PASTE_PUBLISHED_CSV_URL_HERE';

let allRows = [];
let activeType = '';

function hasName(r){ return String(r['Tên tài liệu']||'').trim() !== ''; }
function parseDateParts(v){
  const s = String(v||'').trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return {y:m[1], mo:m[2].padStart(2,'0'), d:m[3].padStart(2,'0')};
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return {y:m[3], mo:m[2].padStart(2,'0'), d:m[1].padStart(2,'0')};
  return null;
}
function displayDate(v){
  const p = parseDateParts(v);
  return p ? (p.d+'/'+p.mo+'/'+p.y) : String(v||'').trim();
}
function yearOf(v){
  const p = parseDateParts(v);
  return p ? p.y : '';
}

async function loadAll(){
  const statusEl = document.getElementById('statusNote');
  if (!CSV_URL || CSV_URL.indexOf('PASTE_') === 0){
    statusEl.textContent = 'Chưa cấu hình link CSV — xem mục "Thiết lập trang Tra cứu" trong README.';
    return;
  }
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
    allRows = parsed.data.filter(hasName);
    statusEl.textContent = 'Đã tải ' + allRows.length + ' tài liệu. Dữ liệu là bản chỉ-đọc, tự đồng bộ từ Sheet quản lý.';
  } catch(e){
    console.error(e);
    statusEl.textContent = 'Không tải được dữ liệu — kiểm tra lại link CSV trong cấu hình.';
    return;
  }
  buildTypeChips();
  buildFilterOptions();
  renderTable();
}

function buildTypeChips(){
  const wrap = document.getElementById('typeChips');
  wrap.innerHTML = '';
  const types = [...new Set(allRows.map(r => r['Loại tài liệu']).filter(Boolean))].sort();
  const allChip = document.createElement('div');
  allChip.className = 'chip' + (activeType === '' ? ' active' : '');
  allChip.innerHTML = 'Tất cả <span class="n">(' + allRows.length + ')</span>';
  allChip.onclick = () => { activeType = ''; buildTypeChips(); renderTable(); };
  wrap.appendChild(allChip);
  types.forEach(t => {
    const n = allRows.filter(r => r['Loại tài liệu'] === t).length;
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeType === t ? ' active' : '');
    chip.innerHTML = t + ' <span class="n">(' + n + ')</span>';
    chip.onclick = () => { activeType = t; buildTypeChips(); renderTable(); };
    wrap.appendChild(chip);
  });
}

function buildFilterOptions(){
  const uSel = document.getElementById('unitFilter');
  uSel.innerHTML = '<option value="">Tất cả đơn vị biên soạn</option>';
  [...new Set(allRows.map(r => r['Đơn vị biên soạn']).filter(Boolean))].sort().forEach(u => {
    const o = document.createElement('option'); o.value = u; o.textContent = u; uSel.appendChild(o);
  });
  const ySel = document.getElementById('yearFilter');
  ySel.innerHTML = '<option value="">Tất cả các năm</option>';
  [...new Set(allRows.map(r => yearOf(r['Ngày hiệu lực'])).filter(Boolean))].sort().forEach(y => {
    const o = document.createElement('option'); o.value = y; o.textContent = y; ySel.appendChild(o);
  });
}

['searchBox','unitFilter','yearFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTable);
  document.getElementById(id).addEventListener('change', renderTable);
});

function renderTable(){
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  head.innerHTML = ''; body.innerHTML = '';
  const cols = ['Loại tài liệu','Đơn vị biên soạn','MSTL','Tên tài liệu','Lần BH','Ngày hiệu lực','QĐ ban hành','Trạng thái'];
  cols.forEach(c => { const th = document.createElement('th'); th.textContent = c; head.appendChild(th); });

  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  const unit = document.getElementById('unitFilter').value;
  const year = document.getElementById('yearFilter').value;

  const filtered = allRows.filter(r => {
    if (activeType && r['Loại tài liệu'] !== activeType) return false;
    if (unit && r['Đơn vị biên soạn'] !== unit) return false;
    if (year && yearOf(r['Ngày hiệu lực']) !== year) return false;
    if (!search) return true;
    return cols.some(c => String(r[c]??'').toLowerCase().includes(search));
  });

  document.getElementById('countLine').textContent = filtered.length + ' / ' + allRows.length + ' tài liệu';

  if (!filtered.length){
    const tr = document.createElement('tr'); const td = document.createElement('td');
    td.colSpan = cols.length; td.className = 'empty';
    td.textContent = 'Không có dữ liệu phù hợp.';
    tr.appendChild(td); body.appendChild(tr); return;
  }
  filtered.forEach(r => {
    const tr = document.createElement('tr');
    const isExpired = r['Trạng thái'] === 'Hết hiệu lực';
    if (isExpired) tr.classList.add('expired');
    cols.forEach(c => {
      const td = document.createElement('td');
      if (c === 'Trạng thái'){
        const span = document.createElement('span');
        span.className = 'badge ' + (isExpired ? 'bad' : 'ok');
        span.textContent = r[c] || 'Còn hiệu lực';
        td.appendChild(span);
      } else {
        let val = r[c];
        if (c === 'Ngày hiệu lực') val = displayDate(val);
        if (c === 'MSTL') td.classList.add('mstl');
        td.textContent = val || '';
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

loadAll();
</script>

</body>
</html>
